version: '3.8'

services:
  voltio-services:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voltio-all-services
    restart: unless-stopped
    ports:
      - "8081:8081"  # WebSocket server port
    environment:
      # RabbitMQ Configuration
      - RABBITMQ_URI=${RABBITMQ_URI:-amqp://admin:trike@52.73.74.139:5672/}
      
      # InfluxDB Configuration
      - INFLUX_URL=${INFLUX_URL:-http://52.201.107.193:8086}
      - INFLUX_TOKEN=${INFLUX_TOKEN:-lJLzxtHLHvPNgdvU9dcInGYb/qLbLxUPgrePzLd47EKCLUWBzJ+RmJkpH0f1HkmQ}
      - INFLUX_ORG=${INFLUX_ORG:-mi-org}
      - INFLUX_BUCKET=${INFLUX_BUCKET:-sensores}
      
      # Queue Names
      - ALERTS_QUEUE_NAME=${ALERTS_QUEUE_NAME:-alerts-queue}
      - PZEM_QUEUE_NAME=${PZEM_QUEUE_NAME:-pzem-data-queue}
      - DHT22_QUEUE_NAME=${DHT22_QUEUE_NAME:-dht22-data-queue}
      - LIGHT_QUEUE_NAME=${LIGHT_QUEUE_NAME:-light-sensor-data-queue}
      - PIR_QUEUE_NAME=${PIR_QUEUE_NAME:-pir-data-queue}
      
      # WebSocket URIs
      - PZEM_WEBSOCKET_URI=${PZEM_WEBSOCKET_URI:-wss://websocketvoltio.acstree.xyz/ws?topic=pzem&emitter=true}
      - DHT22_WEBSOCKET_URI=${DHT22_WEBSOCKET_URI:-wss://websocketvoltio.acstree.xyz/ws?topic=dht22&emitter=true}
      - LIGHT_WEBSOCKET_URI=${LIGHT_WEBSOCKET_URI:-wss://websocketvoltio.acstree.xyz/ws?topic=light&emitter=true}
      - PIR_WEBSOCKET_URI=${PIR_WEBSOCKET_URI:-wss://websocketvoltio.acstree.xyz/ws?topic=pir&emitter=true}
      
      # Notification Service
      - API_WEBHOOK_URL=${API_WEBHOOK_URL:-http://api-service:8000/api/internal/notifications}
      - API_WEBHOOK_TOKEN=${API_WEBHOOK_TOKEN:-}
    
    volumes:
      - ./logs:/var/log/supervisor  # Mount logs directory for easy access
    
    networks:
      - voltio-network
    
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  voltio-network:
    driver: bridge
