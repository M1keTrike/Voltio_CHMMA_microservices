# docker-compose.yml - Updated with all new consumers following specifications
version: "3.8"

services:
  # PZEM Consumer (existing, adapted to new queue naming)
  pzem-consumer:
    build:
      context: .
      dockerfile: Dockerfile.pzem
    container_name: voltio-pzem-consumer
    environment:
      - RABBITMQ_URI=amqp://admin:trike@52.73.74.139:5672/
      - QUEUE_NAME=pzem-data-queue
      - WEBSOCKET_URI=wss://websocketvoltio.acstree.xyz/ws?topic=pzem&emitter=true
      - INFLUX_URL=http://52.201.107.193:8086
      - INFLUX_TOKEN=lJLzxtHLHvPNgdvU9dcInGYb/qLbLxUPgrePzLd47EKCLUWBzJ+RmJkpH0f1HkmQ
      - INFLUX_ORG=mi-org
      - INFLUX_BUCKET=sensores
      - CONSUMER_TYPE=pzem
      - TOPIC_NAME=pzem
      - TIMEOUT_SECONDS=300
      - ALERTS_QUEUE_NAME=alerts-queue
    restart: unless-stopped
    networks:
      - voltio-network
    depends_on:
      - notification-consumer

  # DHT22 Consumer
  dht22-consumer:
    build:
      context: .
      dockerfile: Dockerfile.dht22
    container_name: voltio-dht22-consumer
    environment:
      - RABBITMQ_URI=amqp://admin:trike@52.73.74.139:5672/
      - QUEUE_NAME=dht22-data-queue
      - WEBSOCKET_URI=wss://websocketvoltio.acstree.xyz/ws?topic=dht22&emitter=true
      - INFLUX_URL=http://52.201.107.193:8086
      - INFLUX_TOKEN=lJLzxtHLHvPNgdvU9dcInGYb/qLbLxUPgrePzLd47EKCLUWBzJ+RmJkpH0f1HkmQ
      - INFLUX_ORG=mi-org
      - INFLUX_BUCKET=sensores
      - CONSUMER_TYPE=dht22
      - TOPIC_NAME=dht22
      - TIMEOUT_SECONDS=300
      - ALERTS_QUEUE_NAME=alerts-queue
    restart: unless-stopped
    networks:
      - voltio-network
    depends_on:
      - notification-consumer

  # Light Sensor Consumer
  light-sensor-consumer:
    build:
      context: .
      dockerfile: Dockerfile.light-sensor
    container_name: voltio-light-sensor-consumer
    environment:
      - RABBITMQ_URI=amqp://admin:trike@52.73.74.139:5672/
      - QUEUE_NAME=light-sensor-data-queue
      - WEBSOCKET_URI=wss://websocketvoltio.acstree.xyz/ws?topic=light&emitter=true
      - INFLUX_URL=http://52.201.107.193:8086
      - INFLUX_TOKEN=lJLzxtHLHvPNgdvU9dcInGYb/qLbLxUPgrePzLd47EKCLUWBzJ+RmJkpH0f1HkmQ
      - INFLUX_ORG=mi-org
      - INFLUX_BUCKET=sensores
      - CONSUMER_TYPE=light-sensor
      - TOPIC_NAME=light
      - TIMEOUT_SECONDS=300
      - ALERTS_QUEUE_NAME=alerts-queue
    restart: unless-stopped
    networks:
      - voltio-network
    depends_on:
      - notification-consumer

  # PIR Consumer
  pir-consumer:
    build:
      context: .
      dockerfile: Dockerfile.pir-consumer
    container_name: voltio-pir-consumer
    environment:
      - RABBITMQ_URI=amqp://admin:trike@52.73.74.139:5672/
      - QUEUE_NAME=pir-data-queue
      - WEBSOCKET_URI=wss://websocketvoltio.acstree.xyz/ws?topic=pir&emitter=true
      - INFLUX_URL=http://52.201.107.193:8086
      - INFLUX_TOKEN=lJLzxtHLHvPNgdvU9dcInGYb/qLbLxUPgrePzLd47EKCLUWBzJ+RmJkpH0f1HkmQ
      - INFLUX_ORG=mi-org
      - INFLUX_BUCKET=sensores
      - CONSUMER_TYPE=pir
      - TOPIC_NAME=pir
      - TIMEOUT_SECONDS=300
      - ALERTS_QUEUE_NAME=alerts-queue
    restart: unless-stopped
    networks:
      - voltio-network
    depends_on:
      - notification-consumer

  # Notification Consumer (Handles alerts from all sensors)
  notification-consumer:
    build:
      context: .
      dockerfile: Dockerfile.notification
    container_name: voltio-notification-consumer
    environment:
      - RABBITMQ_URI=amqp://admin:trike@52.73.74.139:5672/
      - ALERTS_QUEUE_NAME=alerts-queue
      - API_WEBHOOK_URL=http://api-service:8000/api/internal/notifications
      - API_WEBHOOK_TOKEN=${API_WEBHOOK_TOKEN:-}
    restart: unless-stopped
    networks:
      - voltio-network

networks:
  voltio-network:
    driver: bridge
