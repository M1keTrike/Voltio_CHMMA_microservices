# =====================================
# DOCKER COMPOSE SISTEMA VOLTIO COMPLETO
# =====================================
# Incluye todos los servicios necesarios:
# - Backend unificado (todos los consumers + websocket)
# - RabbitMQ
# - InfluxDB
# - PostgreSQL

version: '3.8'

services:
  # === BACKEND VOLTIO UNIFICADO ===
  voltio-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voltio-backend
    restart: unless-stopped
    environment:
      # RabbitMQ
      - RABBITMQ_URI=amqp://guest:guest@rabbitmq:5672/
      
      # InfluxDB
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=lJLzxtHLHvPNgdvU9dcInGYb/qLbLxUPgrePzLd47EKCLUWBzJ+RmJkpH0f1HkmQ
      - INFLUXDB_ORG=mi-org
      - INFLUXDB_BUCKET=sensores
      
      # PostgreSQL Externa (tu base de datos)
      - POSTGRES_HOST=13.222.89.227
      - POSTGRES_PORT=5432
      - POSTGRES_DB=voltiodb
      - POSTGRES_USER=chmma
      - POSTGRES_PASSWORD=HSQCx3Ajt4p^aJGC
    depends_on:
      - rabbitmq
      - influxdb
    networks:
      - voltio-network

  # === RABBITMQ ===
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: voltio-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - voltio-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # === INFLUXDB ===
  influxdb:
    image: influxdb:2.7-alpine
    container_name: voltio-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=mi-org
      - DOCKER_INFLUXDB_INIT_BUCKET=sensores
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=lJLzxtHLHvPNgdvU9dcInGYb/qLbLxUPgrePzLd47EKCLUWBzJ+RmJkpH0f1HkmQ
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    networks:
      - voltio-network
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

# === VOLÚMENES PERSISTENTES ===
volumes:
  rabbitmq_data:
    driver: local
  influxdb_data:
    driver: local
  influxdb_config:
    driver: local

# === RED INTERNA ===
networks:
  voltio-network:
    driver: bridge
