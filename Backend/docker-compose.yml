# ==============================================================================
# DOCKER COMPOSE VOLTIO BACKEND - PRODUCCIÓN EC2
# Despliega microservicios Go conectados a PostgreSQL, InfluxDB y RabbitMQ
# ==============================================================================

version: "3.8"

services:
  # ----------------------------------------------------------------------------
  # WebSocket Server - Comunicación en tiempo real
  # ----------------------------------------------------------------------------
  websocket-server:
    build:
      context: ./WebSocketServer
      dockerfile: Dockerfile
    container_name: voltio-websocket
    restart: always
    ports:
      - "8081:8081"
    networks:
      - voltio-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8081/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ----------------------------------------------------------------------------
  # Automation Engine - Motor de reglas de automatización
  # ----------------------------------------------------------------------------
  automation-engine:
    build:
      context: ./automation-engine
      dockerfile: Dockerfile
    container_name: voltio-automation
    restart: always
    environment:
      RABBITMQ_URI: ${RABBITMQ_URI}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - voltio-network
    depends_on:
      - websocket-server

  # ----------------------------------------------------------------------------
  # PIR Consumer - Sensores de movimiento
  # ----------------------------------------------------------------------------
  pir-consumer:
    build:
      context: ./PIR_ConsumerSender
      dockerfile: Dockerfile
    container_name: voltio-pir-consumer
    restart: always
    environment:
      RABBITMQ_URI: ${RABBITMQ_URI}
      INFLUXDB_URL: ${INFLUXDB_URL}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      PIR_WEBSOCKET_URI: ws://websocket-server:8081/ws?topic=pir&emitter=true
    networks:
      - voltio-network
    depends_on:
      - websocket-server

  # ----------------------------------------------------------------------------
  # DHT22 Consumer - Temperatura y humedad
  # ----------------------------------------------------------------------------
  dht22-consumer:
    build:
      context: ./DHT22_ConsumerSender
      dockerfile: Dockerfile
    container_name: voltio-dht22-consumer
    restart: always
    environment:
      RABBITMQ_URI: ${RABBITMQ_URI}
      INFLUXDB_URL: ${INFLUXDB_URL}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      DHT22_WEBSOCKET_URI: ws://websocket-server:8081/ws?topic=dht22&emitter=true
    networks:
      - voltio-network
    depends_on:
      - websocket-server

  # ----------------------------------------------------------------------------
  # Light Sensor Consumer - Luminosidad
  # ----------------------------------------------------------------------------
  light-consumer:
    build:
      context: ./LightSensor_ConsumerSender
      dockerfile: Dockerfile
    container_name: voltio-light-consumer
    restart: always
    environment:
      RABBITMQ_URI: ${RABBITMQ_URI}
      INFLUXDB_URL: ${INFLUXDB_URL}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      LIGHT_WEBSOCKET_URI: ws://websocket-server:8081/ws?topic=light&emitter=true
    networks:
      - voltio-network
    depends_on:
      - websocket-server

  # ----------------------------------------------------------------------------
  # PZEM Consumer - Medidores de energía eléctrica
  # ----------------------------------------------------------------------------
  pzem-consumer:
    build:
      context: ./PZEM_ConsumerSender
      dockerfile: Dockerfile
    container_name: voltio-pzem-consumer
    restart: always
    environment:
      RABBITMQ_URI: ${RABBITMQ_URI}
      INFLUXDB_URL: ${INFLUXDB_URL}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      PZEM_WEBSOCKET_URI: ws://websocket-server:8081/ws?topic=pzem&emitter=true
    networks:
      - voltio-network
    depends_on:
      - websocket-server

  # ----------------------------------------------------------------------------
  # Notification Consumer - Alertas y notificaciones
  # ----------------------------------------------------------------------------
  notification-consumer:
    build:
      context: ./Notification_ConsumerSender
      dockerfile: Dockerfile
    container_name: voltio-notification
    restart: always
    environment:
      RABBITMQ_URI: ${RABBITMQ_URI}
      WEBHOOK_URL: ${WEBHOOK_URL}
    networks:
      - voltio-network

networks:
  voltio-network:
    driver: bridge
