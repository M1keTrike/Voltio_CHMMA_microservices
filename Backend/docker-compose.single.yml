# =====================================
# DOCKER COMPOSE PARA CONSUMERS INDIVIDUALES
# =====================================
# Permite ejecutar un consumer específico

version: '3.8'

services:
  # === PZEM CONSUMER ===
  pzem-consumer:
    build:
      context: .
      dockerfile: Dockerfile.single
      args:
        CONSUMER_TYPE: pzem
    container_name: voltio-pzem-consumer
    restart: unless-stopped
    environment:
      - RABBITMQ_URI=amqp://guest:guest@rabbitmq:5672/
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=lJLzxtHLHvPNgdvU9dcInGYb/qLbLxUPgrePzLd47EKCLUWBzJ+RmJkpH0f1HkmQ
      - INFLUXDB_ORG=mi-org
      - INFLUXDB_BUCKET=sensores
      - POSTGRES_HOST=13.222.89.227
      - POSTGRES_PORT=5432
      - POSTGRES_DB=voltiodb
      - POSTGRES_USER=chmma
      - POSTGRES_PASSWORD=HSQCx3Ajt4p^aJGC
    depends_on:
      - rabbitmq
      - influxdb
    networks:
      - voltio-network
    profiles:
      - pzem
      - all-consumers

  # === DHT22 CONSUMER ===
  dht22-consumer:
    build:
      context: .
      dockerfile: Dockerfile.single
      args:
        CONSUMER_TYPE: dht22
    container_name: voltio-dht22-consumer
    restart: unless-stopped
    environment:
      - RABBITMQ_URI=amqp://guest:guest@rabbitmq:5672/
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=lJLzxtHLHvPNgdvU9dcInGYb/qLbLxUPgrePzLd47EKCLUWBzJ+RmJkpH0f1HkmQ
      - INFLUXDB_ORG=mi-org
      - INFLUXDB_BUCKET=sensores
      - POSTGRES_HOST=13.222.89.227
      - POSTGRES_PORT=5432
      - POSTGRES_DB=voltiodb
      - POSTGRES_USER=chmma
      - POSTGRES_PASSWORD=HSQCx3Ajt4p^aJGC
    depends_on:
      - rabbitmq
      - influxdb
    networks:
      - voltio-network
    profiles:
      - dht22
      - all-consumers

  # === PIR CONSUMER ===
  pir-consumer:
    build:
      context: .
      dockerfile: Dockerfile.single
      args:
        CONSUMER_TYPE: pir
    container_name: voltio-pir-consumer
    restart: unless-stopped
    environment:
      - RABBITMQ_URI=amqp://guest:guest@rabbitmq:5672/
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=lJLzxtHLHvPNgdvU9dcInGYb/qLbLxUPgrePzLd47EKCLUWBzJ+RmJkpH0f1HkmQ
      - INFLUXDB_ORG=mi-org
      - INFLUXDB_BUCKET=sensores
      - POSTGRES_HOST=13.222.89.227
      - POSTGRES_PORT=5432
      - POSTGRES_DB=voltiodb
      - POSTGRES_USER=chmma
      - POSTGRES_PASSWORD=HSQCx3Ajt4p^aJGC
    depends_on:
      - rabbitmq
      - influxdb
    networks:
      - voltio-network
    profiles:
      - pir
      - all-consumers

  # === LIGHT SENSOR CONSUMER ===
  light-consumer:
    build:
      context: .
      dockerfile: Dockerfile.single
      args:
        CONSUMER_TYPE: light
    container_name: voltio-light-consumer
    restart: unless-stopped
    environment:
      - RABBITMQ_URI=amqp://guest:guest@rabbitmq:5672/
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=lJLzxtHLHvPNgdvU9dcInGYb/qLbLxUPgrePzLd47EKCLUWBzJ+RmJkpH0f1HkmQ
      - INFLUXDB_ORG=mi-org
      - INFLUXDB_BUCKET=sensores
      - POSTGRES_HOST=13.222.89.227
      - POSTGRES_PORT=5432
      - POSTGRES_DB=voltiodb
      - POSTGRES_USER=chmma
      - POSTGRES_PASSWORD=HSQCx3Ajt4p^aJGC
    depends_on:
      - rabbitmq
      - influxdb
    networks:
      - voltio-network
    profiles:
      - light
      - all-consumers

  # === NOTIFICATION CONSUMER ===
  notification-consumer:
    build:
      context: .
      dockerfile: Dockerfile.single
      args:
        CONSUMER_TYPE: notification
    container_name: voltio-notification-consumer
    restart: unless-stopped
    environment:
      - RABBITMQ_URI=amqp://guest:guest@rabbitmq:5672/
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=lJLzxtHLHvPNgdvU9dcInGYb/qLbLxUPgrePzLd47EKCLUWBzJ+RmJkpH0f1HkmQ
      - INFLUXDB_ORG=mi-org
      - INFLUXDB_BUCKET=sensores
      - POSTGRES_HOST=13.222.89.227
      - POSTGRES_PORT=5432
      - POSTGRES_DB=voltiodb
      - POSTGRES_USER=chmma
      - POSTGRES_PASSWORD=HSQCx3Ajt4p^aJGC
    depends_on:
      - rabbitmq
      - influxdb
    networks:
      - voltio-network
    profiles:
      - notification
      - all-consumers

  # === AUTOMATION ENGINE ===
  automation-engine:
    build:
      context: .
      dockerfile: Dockerfile.single
      args:
        CONSUMER_TYPE: automation
    container_name: voltio-automation-engine
    restart: unless-stopped
    environment:
      - RABBITMQ_URI=amqp://guest:guest@rabbitmq:5672/
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=lJLzxtHLHvPNgdvU9dcInGYb/qLbLxUPgrePzLd47EKCLUWBzJ+RmJkpH0f1HkmQ
      - INFLUXDB_ORG=mi-org
      - INFLUXDB_BUCKET=sensores
      - POSTGRES_HOST=13.222.89.227
      - POSTGRES_PORT=5432
      - POSTGRES_DB=voltiodb
      - POSTGRES_USER=chmma
      - POSTGRES_PASSWORD=HSQCx3Ajt4p^aJGC
    depends_on:
      - rabbitmq
      - influxdb
    networks:
      - voltio-network
    profiles:
      - automation
      - all-consumers

  # === RABBITMQ ===
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: voltio-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - voltio-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    profiles:
      - pzem
      - dht22
      - pir
      - light
      - notification
      - automation
      - all-consumers

  # === INFLUXDB ===
  influxdb:
    image: influxdb:2.7-alpine
    container_name: voltio-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=mi-org
      - DOCKER_INFLUXDB_INIT_BUCKET=sensores
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=lJLzxtHLHvPNgdvU9dcInGYb/qLbLxUPgrePzLd47EKCLUWBzJ+RmJkpH0f1HkmQ
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    networks:
      - voltio-network
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    profiles:
      - pzem
      - dht22
      - pir
      - light
      - notification
      - automation
      - all-consumers

# === VOLÚMENES PERSISTENTES ===
volumes:
  rabbitmq_data:
    driver: local
  influxdb_data:
    driver: local
  influxdb_config:
    driver: local

# === RED INTERNA ===
networks:
  voltio-network:
    driver: bridge
